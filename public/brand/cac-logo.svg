<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Corporate Affairs Commission Nigeria">
  <defs>
    <path id="cac-top-arc" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="cac-bottom-arc" d="M 170 100 A 70 70 0 0 1 30 100" fill="none"/>
  </defs>

  <!-- Outer green ring -->
  <circle cx="100" cy="100" r="98" fill="#006838"/>
  <circle cx="100" cy="100" r="88" fill="#ffffff"/>
  <circle cx="100" cy="100" r="78" fill="#006838"/>

  <!-- Top arc text -->
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">
    <textPath href="#cac-top-arc" startOffset="50%" text-anchor="middle">
      CORPORATE AFFAIRS COMMISSION
    </textPath>
  </text>

  <!-- Bottom arc text -->
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="9.5" font-weight="600" letter-spacing="0.8">
    <textPath href="#cac-bottom-arc" startOffset="50%" text-anchor="middle">
      FEDERAL REPUBLIC OF NIGERIA
    </textPath>
  </text>

  <!-- Inner white disc -->
  <circle cx="100" cy="100" r="58" fill="#ffffff"/>

  <!-- Simplified Nigerian coat of arms (center) -->
  <g transform="translate(100 100)">
    <!-- Eagle -->
    <path d="M0 -38 L4 -28 L0 -24 L-4 -28 Z" fill="#1a1a1a"/>
    <ellipse cx="0" cy="-30" rx="5" ry="3" fill="#1a1a1a"/>
    <!-- Shield -->
    <path d="M-18 0 C-18 -14 -10 -22 0 -24 C10 -22 18 -14 18 0 C18 14 10 22 0 24 C-10 22 -18 14 -18 0Z" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="0.5"/>
    <!-- White Y on shield -->
    <path d="M0 -18 L-10 8 L-4 8 L0 -4 L4 8 L10 8 Z" fill="#ffffff"/>
    <!-- Green base -->
    <rect x="-12" y="10" width="24" height="6" rx="1" fill="#006838"/>
    <!-- Supporters (stylized horses) -->
    <path d="M-28 8 C-32 -4 -26 -12 -20 -8 C-18 -2 -22 4 -28 8Z" fill="#8B7355" opacity="0.85"/>
    <path d="M28 8 C32 -4 26 -12 20 -8 C18 -2 22 4 28 8Z" fill="#8B7355" opacity="0.85"/>
    <!-- Motto scroll -->
    <rect x="-22" y="22" width="44" height="8" rx="2" fill="#006838"/>
    <text x="0" y="28" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="4.5" font-weight="600">UNITY AND FAITH</text>
  </g>

  <!-- Decorative stars -->
  <circle cx="100" cy="34" r="2" fill="#ffffff"/>
  <circle cx="100" cy="166" r="2" fill="#ffffff"/>
</svg>
