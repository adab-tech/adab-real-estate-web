<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adab Jotting Pad</title>
  <style>
    @page { size: A4 portrait; margin: 0; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f0efec; }
    .toolbar { background: #1B2A4A; color: #fff; padding: 10px 16px; display: flex; justify-content: space-between; }
    .toolbar button { background: #C9A227; border: 0; border-radius: 999px; padding: 8px 14px; color: #1B2A4A; font-weight: 700; }
    .page { width: 210mm; min-height: 297mm; margin: 20px auto; background: #fff; padding: 14mm; }
    .header { border-bottom: 2px solid #C9A227; padding-bottom: 8mm; margin-bottom: 8mm; display: flex; justify-content: space-between; align-items: center; color: #1B2A4A; }
    .line { height: 9mm; border-bottom: 1px solid rgba(27,42,74,.2); }
    .footer { margin-top: 10mm; font-size: 12px; color: #1B2A4A; }
    @media print { .toolbar { display: none; } body { background: #fff; } .page { margin: 0; } }
  </style>
</head>
<body>
  <div class="toolbar"><span>Printable jotting pad</span><button onclick="window.print()">Print</button></div>
  <section class="page">
    <header class="header">
      <img src="/brand/logo.png" alt="Adab" style="height:34px" />
      <strong contenteditable="true">Jotter / Meeting Notes</strong>
    </header>
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
    <footer class="footer">hello@adab.ng | +2348128272287 | RC 9590252</footer>
  </section>
</body>
</html>
