<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adab T-Shirt Design</title>
  <style>
    @page { size: A4 portrait; margin: 8mm; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #eceae5; }
    .toolbar { background: #1B2A4A; color: #fff; padding: 10px 16px; display: flex; justify-content: space-between; }
    .toolbar button { background: #C9A227; border: 0; border-radius: 999px; padding: 8px 14px; color: #1B2A4A; font-weight: 700; }
    .page { width: 210mm; min-height: 297mm; margin: 20px auto; background: #fff; padding: 10mm; }
    .artboard { border: 1px solid rgba(27,42,74,.15); border-radius: 12px; padding: 10mm; display: grid; gap: 10mm; }
    .shirt { min-height: 120mm; border-radius: 10px; background: #1B2A4A; color: #fff; display: grid; place-items: center; text-align: center; padding: 12mm; }
    .shirt.light { background: #F8F6F1; color: #1B2A4A; border: 2px solid #1B2A4A; }
    .shirt img { height: 30px; margin-bottom: 8mm; filter: brightness(0) invert(1); }
    .shirt.light img { filter: none; }
    .tag { font-size: 22px; font-weight: 700; }
    .meta { font-size: 12px; color: #1B2A4A; }
    @media print { .toolbar { display: none; } body { background: #fff; } .page { margin: 0; } }
  </style>
</head>
<body>
  <div class="toolbar"><span>T-shirt front/back concept</span><button onclick="window.print()">Print</button></div>
  <main class="page">
    <section class="artboard">
      <div class="shirt">
        <div>
          <img src="/brand/logo.png" alt="Adab" />
          <div class="tag" contenteditable="true">Trusted Property Solutions</div>
          <p contenteditable="true">adab.ng</p>
        </div>
      </div>
      <div class="shirt light">
        <div>
          <img src="/brand/logo.png" alt="Adab" />
          <div class="tag" contenteditable="true">Buy | Sell | Rent | Manage</div>
          <p contenteditable="true">hello@adab.ng | +2348128272287</p>
        </div>
      </div>
      <p class="meta">Use navy shirt with cream/gold print OR cream shirt with navy/gold print. Keep logo aspect ratio unchanged.</p>
    </section>
  </main>
</body>
</html>
